<svg xmlns="http://www.w3.org/2000/svg" width="860" height="120" viewBox="0 0 860 120" role="img" aria-label="WaferWise animated banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220" />
      <stop offset="1" stop-color="#0f2f3e" />
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4" />
      <stop offset="1" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="860" height="120" rx="14" fill="url(#bg)" />

  <path d="M0,80 C80,50 160,110 240,80 S400,110 480,80 640,110 720,80 860,80 860,80" fill="none" stroke="url(#wave)" stroke-width="4" stroke-dasharray="10 12">
    <animate attributeName="stroke-dashoffset" values="0;-264" dur="6s" repeatCount="indefinite" />
  </path>

  <circle cx="40" cy="80" r="5" fill="#5eead4">
    <animate attributeName="cx" values="40;820" dur="6s" repeatCount="indefinite" />
  </circle>

  <text x="36" y="52" fill="#38bdf8" font-size="30" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="0.6" filter="url(#titleGlow)">WaferWise</text>
  <text x="36" y="52" fill="#f8fafc" font-size="30" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="0.6">WaferWise</text>
  <text x="36" y="78" fill="#cbd5e1" font-size="15" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">Edge-ready wafer defect classification</text>
  <text x="36" y="98" fill="#94a3b8" font-size="12" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">MobileNetV3Small + TFLite INT8</text>
</svg>
